<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Panel - Job Provider Consultancy</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:'Inter',sans-serif; background:#f8fafc; color:#1e293b; }

    /* LOGIN */
    #loginPage {
      min-height:100vh; display:flex; align-items:center;
      justify-content:center;
      background:linear-gradient(135deg,#0f172a,#1e3a8a);
    }
    .login-box {
      background:white; border-radius:16px; padding:40px;
      width:100%; max-width:400px; box-shadow:0 24px 48px rgba(0,0,0,0.2);
    }
    .login-box h2 { font-size:24px; font-weight:700; margin-bottom:8px; }
    .login-box p { color:#64748b; font-size:14px; margin-bottom:28px; }
    .login-box input {
      width:100%; padding:12px 16px; border:1.5px solid #e2e8f0;
      border-radius:8px; font-size:14px; outline:none; margin-bottom:14px;
      font-family:'Inter',sans-serif;
    }
    .login-box input:focus { border-color:#1d4ed8; }
    .btn-login {
      width:100%; padding:13px; background:#1d4ed8; color:white;
      border:none; border-radius:8px; font-size:15px; font-weight:600;
      cursor:pointer; transition:background 0.2s;
    }
    .btn-login:hover { background:#1e3a8a; }
    .login-error { color:#dc2626; font-size:13px; margin-top:8px; display:none; }

    /* ADMIN PANEL */
    #adminPanel { display:none; }
    .admin-nav {
      background:#0f172a; padding:0 24px;
      display:flex; align-items:center; justify-content:space-between;
      height:64px;
    }
    .admin-nav .logo { color:white; font-weight:700; font-size:16px; display:flex; align-items:center; gap:10px; }
    .admin-nav .logo i { color:#f59e0b; }
    .admin-nav button {
      background:rgba(255,255,255,0.1); color:white; border:none;
      padding:8px 16px; border-radius:8px; cursor:pointer; font-size:13px;
    }
    .admin-nav button:hover { background:rgba(255,255,255,0.2); }

    .admin-content { max-width:1200px; margin:0 auto; padding:32px 24px; }
    .admin-header { margin-bottom:32px; }
    .admin-header h1 { font-size:28px; font-weight:800; margin-bottom:4px; }
    .admin-header p { color:#64748b; }

    .stats-row { display:grid; grid-template-columns:repeat(3,1fr); gap:20px; margin-bottom:32px; }
    .stat-card {
      background:white; border-radius:12px; padding:24px;
      border:1.5px solid #e2e8f0; display:flex; align-items:center; gap:16px;
    }
    .stat-icon {
      width:48px; height:48px; border-radius:12px;
      display:flex; align-items:center; justify-content:center; font-size:20px;
    }
    .stat-card h3 { font-size:28px; font-weight:800; }
    .stat-card p { color:#64748b; font-size:13px; }

    .panel-card { background:white; border-radius:12px; border:1.5px solid #e2e8f0; overflow:hidden; }
    .panel-card-header {
      padding:20px 24px; border-bottom:1px solid #e2e8f0;
      display:flex; align-items:center; justify-content:space-between;
    }
    .panel-card-header h2 { font-size:16px; font-weight:700; }
    .refresh-btn {
      background:#eff6ff; color:#1d4ed8; border:none; padding:8px 16px;
      border-radius:8px; cursor:pointer; font-size:13px; font-weight:500;
      display:flex; align-items:center; gap:6px;
    }
    .refresh-btn:hover { background:#dbeafe; }

    table { width:100%; border-collapse:collapse; }
    th {
      background:#f8fafc; padding:12px 20px; text-align:left;
      font-size:12px; font-weight:600; color:#64748b;
      text-transform:uppercase; letter-spacing:0.5px;
      border-bottom:1px solid #e2e8f0;
    }
    td { padding:16px 20px; font-size:14px; border-bottom:1px solid #f1f5f9; }
    tr:last-child td { border-bottom:none; }
    tr:hover td { background:#f8fafc; }
    .badge {
      padding:4px 10px; border-radius:100px; font-size:11px; font-weight:600;
      background:#f0fdf4; color:#16a34a;
    }
    .empty-state {
      text-align:center; padding:60px 20px; color:#94a3b8;
    }
    .empty-state i { font-size:40px; margin-bottom:16px; display:block; }
  </style>
</head>
<body>

  <!-- LOGIN PAGE -->
  <div id="loginPage">
    <div class="login-box">
      <h2>Admin Login</h2>
      <p>Job Provider Consultancy — Admin Panel</p>
      <input type="text" id="adminUser" placeholder="Username">
      <input type="password" id="adminPass" placeholder="Password">
      <button class="btn-login" onclick="handleLogin()">Login to Dashboard</button>
      <p class="login-error" id="loginError">Invalid username or password</p>
    </div>
  </div>

  <!-- ADMIN PANEL -->
  <div id="adminPanel">
    <nav class="admin-nav">
      <div class="logo">
        <i class="fas fa-briefcase"></i>
        Job Provider Consultancy — Admin
      </div>
      <button onclick="handleLogout()"><i class="fas fa-sign-out-alt"></i> Logout</button>
    </nav>

    <div class="admin-content">
      <div class="admin-header">
        <h1>Dashboard</h1>
        <p>Manage job applications and listings</p>
      </div>

      <div class="stats-row">
        <div class="stat-card">
          <div class="stat-icon" style="background:#eff6ff;color:#1d4ed8">
            <i class="fas fa-file-alt"></i>
          </div>
          <div>
            <h3 id="totalApps">0</h3>
            <p>Total Applications</p>
          </div>
        </div>
        <div class="stat-card">
          <div class="stat-icon" style="background:#f0fdf4;color:#16a34a">
            <i class="fas fa-briefcase"></i>
          </div>
          <div>
            <h3>9</h3>
            <p>Active Job Listings</p>
          </div>
        </div>
        <div class="stat-card">
          <div class="stat-icon" style="background:#fff7ed;color:#ea580c">
            <i class="fas fa-clock"></i>
          </div>
          <div>
            <h3 id="todayApps">0</h3>
            <p>Applications Today</p>
          </div>
        </div>
      </div>

      <div class="panel-card">
        <div class="panel-card-header">
          <h2>Recent Applications</h2>
          <button class="refresh-btn" onclick="loadApplications()">
            <i class="fas fa-sync-alt"></i> Refresh
          </button>
        </div>
        <div id="applicationsTable"></div>
      </div>
    </div>
  </div>

  <script>
    // Simple admin auth
    function handleLogin() {
      const user = document.getElementById("adminUser").value;
      const pass = document.getElementById("adminPass").value;
      if (user === "admin" && pass === "admin123") {
        document.getElementById("loginPage").style.display = "none";
        document.getElementById("adminPanel").style.display = "block";
        loadApplications();
      } else {
        document.getElementById("loginError").style.display = "block";
      }
    }

    function handleLogout() {
      document.getElementById("loginPage").style.display = "flex";
      document.getElementById("adminPanel").style.display = "none";
    }

    function loadApplications() {
      fetch("http://localhost:3000/api/applications")
        .then(res => res.json())
        .then(data => {
          const apps = data.data;
          document.getElementById("totalApps").textContent = apps.length;
          document.getElementById("todayApps").textContent = apps.length;

          const container = document.getElementById("applicationsTable");
          if (apps.length === 0) {
            container.innerHTML = `
              <div class="empty-state">
                <i class="fas fa-inbox"></i>
                <p>No applications yet</p>
              </div>`;
            return;
          }

          container.innerHTML = `
            <table>
              <thead>
                <tr>
                  <th>#</th>
                  <th>Applicant Name</th>
                  <th>Email</th>
                  <th>Job Title</th>
                  <th>Company</th>
                  <th>Applied At</th>
                  <th>Status</th>
                </tr>
              </thead>
              <tbody>
                ${apps.map(app => `
                  <tr>
                    <td>${app.id}</td>
                    <td><strong>${app.name}</strong></td>
                    <td>${app.email}</td>
                    <td>${app.jobTitle}</td>
                    <td>${app.company}</td>
                    <td>${app.appliedAt}</td>
                    <td><span class="badge">Received</span></td>
                  </tr>
                `).join("")}
              </tbody>
            </table>`;
        })
        .catch(() => {
          document.getElementById("applicationsTable").innerHTML = `
            <div class="empty-state">
              <i class="fas fa-exclamation-circle"></i>
              <p>Could not load applications. Make sure backend is running.</p>
            </div>`;
        });
    }

    // Login on Enter key
    document.addEventListener("keypress", e => {
      if (e.key === "Enter") handleLogin();
    });
  </script>
</body>
</html>
